minimum_pre_commit_version: "4.0.0"

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  # Repository hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]

      - id: end-of-file-fixer
        stages: [pre-commit]

      - id: check-yaml
        stages: [pre-commit]

      - id: check-toml
        stages: [pre-commit]

      - id: check-json
        stages: [pre-commit]

      - id: check-merge-conflict
        stages: [pre-commit]

      - id: check-case-conflict
        stages: [pre-commit]

      - id: check-added-large-files
        stages: [pre-commit]

      - id: debug-statements
        stages: [pre-commit]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        stages: [pre-commit]

  # Project development tools
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run --locked ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: ruff-format
        name: Ruff format
        entry: uv run --locked ruff format
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run --locked mypy
        language: system
        pass_filenames: false
        files: ^(app/|tests/|pyproject\.toml$|uv\.lock$)
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run --locked pytest
        language: system
        pass_filenames: false
        files: ^(app/|tests/|pyproject\.toml$|uv\.lock$)
        stages: [pre-push]
