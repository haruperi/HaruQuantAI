# MCP Server Metadata Schema (Playbook §5.9)

```yaml
metadata_schema_version: "1.0"  # Schema version for this metadata format
domain: string                    # Human-readable domain purpose
owner: string                     # Team or person owning this server
side_effect_risk: string          # Risk level: A (read-only) through E (irreversible)
allowed_callers:                  # List of services/agents allowed to call this server
  - string
credentials:                      # List of credential names required
  - string
audit_requirements: string        # What must be logged for audit trail
failure_modes:                    # List of failure scenarios and handling
  - "failure_description → recovery_action"
rate_limits:                      # Rate limits per operation
  operation_name: "count/period"
timeout_budget:                   # Timeout per operation
  operation_name: "duration"
escalation_owner: string          # Who to escalate to on failure
contract_version: string          # API contract version (semver)
deprecation_notes: string|null    # Deprecation info or null
```
